  <script>
    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('carouselDots');
    const slides = track.querySelectorAll('.carousel-slide');
    const perPage = 3;
    const total = slides.length;
    const pages = Math.ceil(total / perPage);
    let currentPage = 0;

    for (let i = 0; i < pages; i++) {
      const dot = document.createElement('div');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    }

    function goTo(page) {
      currentPage = (page + pages) % pages;
      const slideWidth = slides[0].offsetWidth + 6;
      track.style.transform = 'translateX(-' + (currentPage * perPage * slideWidth) + 'px)';
      dotsContainer.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === currentPage);
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => goTo(currentPage - 1));
    document.getElementById('nextBtn').addEventListener('click', () => goTo(currentPage + 1));

    let startX = 0;
    track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    track.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) goTo(diff > 0 ? currentPage + 1 : currentPage - 1);
    });
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    document.querySelectorAll('.carousel-slide').forEach(slide => {
      slide.addEventListener('click', () => {
        const img = slide.querySelector('img');
        if (!img) return;
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('open');
      });
    });

    document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
  </script>
